  <main class="kirakira-sky-page">
    <div class="skyPageInner">

    <header class="hero">
      <div class="titlePanel">
        <span class="titleStar s1"></span>
        <span class="titleStar s2"></span>
        <span class="titleStar s3"></span>
        <span class="titleStar s4"></span>
        <p class="eyebrow">Nagano Night Sky</p>
        <h1>長野市の今夜の星空</h1>
        <p class="lead">長野県長野市｜毎日20:00の星空を自動表示</p>
        <p id="targetDate" class="dateText"></p>
      </div>
    </header>

    <section class="skyCard">
      <canvas id="skyCanvas"></canvas>

      <div class="magnitudeLegend" aria-label="星の明るさの凡例">
        <div class="legendTitle">星の明るさ</div>
        <div class="legendRow"><span class="starDot mag1"></span><span>1等星</span></div>
        <div class="legendRow"><span class="starDot mag2"></span><span>2等星</span></div>
        <div class="legendRow"><span class="starDot mag3"></span><span>3等星</span></div>
        <div class="legendRow"><span class="starDot mag4"></span><span>4等星</span></div>
      </div>

      <div class="legend">
        <span>北を上にした全天図</span>
        <span>円の外周＝地平線 / 中心＝天頂</span>
      </div>
    </section>

    <section class="infoGrid" aria-label="今夜の注目情報">
      <article class="infoCard moonCard">
        <h2>月の情報</h2>
        <div class="cardVisualRow">
          <canvas id="moonCardCanvas" width="84" height="84" aria-label="月齢イラスト"></canvas>
          <p id="moonInfo">計算中...</p>
        </div>
      </article>
      <article class="infoCard planetCard">
        <h2>惑星の情報</h2>
        <div id="planetInfo" class="planetList">計算中...</div>
      </article>
      <article class="infoCard deepSkyCard">
        <h2>星雲・星団</h2>
        <p id="deepSkyInfo">計算中...</p>
        <p id="deepSkyPick" class="miniExplanation"></p>
      </article>
    </section>

    </div>
